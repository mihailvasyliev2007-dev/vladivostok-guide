<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой план</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>🌊 Гид по Владивостоку</h1>
    <p>Мой план</p>
</header>

<nav>
    <a href="index.html">Главная</a>
    <a href="sights.html">Достопримечательности</a>
    <a href="food.html">Где поесть</a>
    <a href="feedback.html">Отзывы</a>
    <a href="todo.html">Мой план</a>
</nav>

<main>
    <h2>📋 Список дел</h2>

    <!-- КНОПКА УВЕДОМЛЕНИЙ -->
    <button id="pushBtn" style="background:#27ae60; color:white; padding:12px 30px; border:0; border-radius:8px; font-size:16px;">
        🔔 Получить уведомление
    </button>
    <div id="pushStatus" style="margin:10px 0; color:#555;"></div>

    <div>
        <input type="text" id="taskInput" placeholder="Что нужно сделать?">
        <input type="date" id="dateInput">
        <select id="prioritySelect">
            <option value="high">Высокий</option>
            <option value="medium" selected>Средний</option>
            <option value="low">Низкий</option>
        </select>
        <button id="addBtn">Добавить</button>
    </div>

    <div id="todoList"></div>
</main>

<script src="js/todo.js"></script>
<script>
    console.log('✅ todo.html загружен');

    document.getElementById('pushBtn').addEventListener('click', function () {
        console.log('👉 Кнопка нажата!');

        if (!('serviceWorker' in navigator)) {
            alert('❌ Service Worker не поддерживается');
            return;
        }

        navigator.serviceWorker.ready
            .then(function (reg) {
                console.log('✅ SW готов');

                reg.active.postMessage({
                    type: 'showNotification',
                    title: 'Гид по Владивостоку',
                    body: 'Пора посетить Золотой мост!',
                    icon: '/icons/icon-192x192.png',
                    url: '/sights.html'
                });

                document.getElementById('pushStatus').innerText = '✅ Уведомление отправлено!';
                setTimeout(() => {
                    document.getElementById('pushStatus').innerText = '';
                }, 3000);
            })
            .catch(function (err) {
                console.error('❌ Ошибка:', err);
            });
    });
</script>

</body>
</html>
