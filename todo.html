<script>
    console.log('Скрипт загружен');

    // Проверка поддержки
    if ('serviceWorker' in navigator && 'PushManager' in window) {
        console.log('Push поддерживается');
    } else {
        console.log('Push НЕ поддерживается');
        document.getElementById('pushStatus').textContent = 'Ваш браузер не поддерживает уведомления';
    }

    document.getElementById('pushBtn').addEventListener('click', function() {
        console.log('Кнопка нажата!');

        if (!('serviceWorker' in navigator)) {
            alert('Service Worker не поддерживается');
            return;
        }

        navigator.serviceWorker.ready
            .then(function(registration) {
                console.log('SW готов!');
                
                // Проверяем разрешение
                if (Notification.permission === 'denied') {
                    alert('Уведомления запрещены в настройках браузера');
                    return;
                }

                if (Notification.permission === 'default') {
                    Notification.requestPermission().then(function(permission) {
                        console.log('Разрешение:', permission);
                        if (permission === 'granted') {
                            sendNotification(registration);
                        } else {
                            alert('Вы запретили уведомления');
                        }
                    });
                } else {
                    sendNotification(registration);
                }
            })
            .catch(function(err) {
                console.error('Ошибка:', err);
                alert('Ошибка: ' + err.message);
            });
    });

    function sendNotification(registration) {
        console.log('Отправка уведомления...');
        
        // Показываем уведомление через Service Worker
        registration.active.postMessage({
            type: 'showNotification',
            title: 'Гид по Владивостоку',
            body: 'Пора посетить Золотой мост!',
            icon: '/icons/icon-192x192.png',
            url: '/sights.html'
        });

        document.getElementById('pushStatus').textContent = 'Уведомление отправлено!';
        document.getElementById('pushStatus').style.color = 'green';

        setTimeout(function() {
            document.getElementById('pushStatus').textContent = '';
        }, 3000);
    }

    // Логируем сообщения от SW
    navigator.serviceWorker.addEventListener('message', function(event) {
        console.log('Сообщение от SW:', event.data);
    });
</script>
